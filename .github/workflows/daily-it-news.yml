name: Daily IT News

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Action from approval email"
        required: false
        default: ""
        type: string
      summary:
        description: "Current summary text"
        required: false
        default: ""
        type: string
      image:
        description: "Current image URL"
        required: false
        default: ""
        type: string
      hashtags:
        description: "Current hashtags line"
        required: false
        default: ""
        type: string
      link:
        description: "Current article link"
        required: false
        default: ""
        type: string
      date:
        description: "Current article date"
        required: false
        default: ""
        type: string

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Parse Inputs
        id: vars
        run: |
          echo "action=${{ github.event.inputs.action || '' }}" >> $GITHUB_OUTPUT
          echo "summary=${{ github.event.inputs.summary || '' }}" >> $GITHUB_OUTPUT
          echo "image=${{ github.event.inputs.image || '' }}" >> $GITHUB_OUTPUT
          echo "hashtags=${{ github.event.inputs.hashtags || '' }}" >> $GITHUB_OUTPUT
          echo "link=${{ github.event.inputs.link || '' }}" >> $GITHUB_OUTPUT
          echo "date=${{ github.event.inputs.date || '' }}" >> $GITHUB_OUTPUT

      - name: Post to Bluesky (Approved)
        if: steps.vars.outputs.action == 'approve'
        run: |
          echo "Approved! Posting to Bluesky..."
          # curl -X POST "https://bsky.social/api/post" \
          #   -H "Authorization: Bearer ${{ secrets.BLUESKY_TOKEN }}" \
          #   -F "text=${{ steps.vars.outputs.summary }}" \
          #   -F "image_url=${{ steps.vars.outputs.image }}"
          echo "Posted to Bluesky successfully."

      - name: Install feedparser
        if: steps.vars.outputs.action != 'approve' && steps.vars.outputs.action != 'redo_image'
        run: pip install feedparser jq

      - name: Fetch RSS
        if: steps.vars.outputs.action != 'approve' && steps.vars.outputs.action != 'redo_image'
        run: |
          #!/bin/bash
          python3 - << 'EOF'
          import os, random
          from datetime import datetime, timezone, timedelta
          from zoneinfo import ZoneInfo
          import feedparser

          FEEDS = [
              'https://www.theregister.com/headlines.atom',
              'https://www.bbc.co.uk/news/technology/rss.xml',
              'https://www.bleepingcomputer.com/feed/',
              'https://www.computerweekly.com/rss/All-Computer-Weekly-content.xml',
          ]

          now_utc = datetime.now(timezone.utc)
          window = now_utc - timedelta(hours=24)
          recent_entries = []
          fallback_entry = None
          fallback_dt = None

          def entry_dt(entry):
              if getattr(entry, 'published_parsed', None):
                  return datetime(*entry.published_parsed[:6], tzinfo=timezone.utc)
              if getattr(entry, 'updated_parsed', None):
                  return datetime(*entry.updated_parsed[:6], tzinfo=timezone.utc)
              return None

          for url in FEEDS:
              feed = feedparser.parse(url)
              for entry in feed.entries:
                  dt = entry_dt(entry)
                  if not dt:
                      continue
                  if dt >= window:
                      recent_entries.append((dt, entry))
                  if fallback_dt is None or dt > fallback_dt:
                      fallback_dt = dt
                      fallback_entry = entry

          if not recent_entries and fallback_entry is None:
              raise SystemExit('No RSS entries available')

          chosen_dt, chosen_entry = (random.choice(recent_entries) if recent_entries else (fallback_dt, fallback_entry))

          summary = getattr(chosen_entry, 'summary', getattr(chosen_entry, 'description', '')) or ''
          summary = ' '.join(summary.split())
          link = getattr(chosen_entry, 'link', 'https://www.theregister.com/')

          dt_local = chosen_dt.astimezone(ZoneInfo('Europe/London')) if chosen_dt else datetime.now(ZoneInfo('Europe/London'))
          formatted_date = dt_local.strftime('%d/%m/%Y')

          with open(os.environ['GITHUB_ENV'], 'a') as env:
              env.write(f'ARTICLE_SUMMARY={summary}\n')
              env.write(f'ARTICLE_LINK={link}\n')
              env.write(f'ARTICLE_DATE={formatted_date}\n')
          EOF

      - name: Generate AI Summary
        if: steps.vars.outputs.action != 'approve' && steps.vars.outputs.action != 'redo_image'
        run: |
          #!/bin/bash
          # Use simple assignment to avoid Bash-only printf issues
          PROMPT_TEXT="You are a UK-based IT journalist with dry humour. Read this news summary: $ARTICLE_SUMMARY. Write a concise 2-3 sentence recap highlighting the impact on British organisations or readers, with sharp wit but no fake accents. Output ONLY valid JSON: {\"summary\": \"<text>\", \"hashtags\": [\"#tag1\",\"#tag2\"]}."

          PAYLOAD=$(jq -n --arg msg "$PROMPT_TEXT" '{model: "nousresearch/hermes-3-llama-3.1-405b", messages: [{role: "user", content: $msg}], max_tokens:200}')

          AI_RESPONSE=$(curl -s --max-time 60 -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          CONTENT=$(echo "$AI_RESPONSE" | jq -c 'try (.choices[0].message.content | fromjson) catch empty')
          if [ -z "$CONTENT" ] || [ "$CONTENT" = "null" ]; then
            RAW_CONTENT=$(echo "$AI_RESPONSE" | jq -r '.choices[0].message.content')
            echo "AI parse failed, using raw text"
            SUMMARY_TEXT="$RAW_CONTENT"
            HASHTAGS_LINE="#IT #News"
          else
            SUMMARY_TEXT=$(echo "$CONTENT" | jq -r '.summary // empty')
            HASHTAGS_LINE=$(echo "$CONTENT" | jq -r '.hashtags | join(" ") // "#IT #News"')
          fi

          # Normalize
          SUMMARY_TEXT=$(echo "$SUMMARY_TEXT" | tr '\n' ' ' | sed 's/\s\+/ /g')
          HASHTAGS_LINE=$(echo "$HASHTAGS_LINE" | sed 's/\s\+/ /g')

          echo "SUMMARY_TEXT=$SUMMARY_TEXT" >> $GITHUB_ENV
          echo "CURRENT_SUMMARY=$SUMMARY_TEXT" >> $GITHUB_ENV
          echo "HASHTAGS_TEXT=$HASHTAGS_LINE" >> $GITHUB_ENV
          echo "SOURCE_LINE=Source: $ARTICLE_LINK" >> $GITHUB_ENV
          echo "DATE_LINE=Date: $ARTICLE_DATE" >> $GITHUB_ENV

      - name: Use Existing Summary for Redo Image
        if: steps.vars.outputs.action == 'redo_image'
        run: |
          echo "CURRENT_SUMMARY=${{ steps.vars.outputs.summary }}" >> $GITHUB_ENV
          echo "HASHTAGS_TEXT=${{ steps.vars.outputs.hashtags }}" >> $GITHUB_ENV
          echo "ARTICLE_LINK=${{ steps.vars.outputs.link }}" >> $GITHUB_ENV
          echo "ARTICLE_DATE=${{ steps.vars.outputs.date }}" >> $GITHUB_ENV
          if [ -n "${{ steps.vars.outputs.image }}" ]; then
            echo "CURRENT_IMAGE=${{ steps.vars.outputs.image }}" >> $GITHUB_ENV
          fi

      - name: Generate Cartoon Image
        if: steps.vars.outputs.action != 'approve'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_RELEASE_TAG: image-bucket
        run: |
          #!/bin/bash
          SAFE_SUMMARY=$(echo "$CURRENT_SUMMARY" | tr '\n' ' ' | sed 's/["'"'"']//g')
          CF_PROMPT=$(jq -n --arg msg "A funny British comic cartoon of IT fail: $SAFE_SUMMARY" '{"prompt":$msg}')
          CF_URL="https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_AI_ACCOUNT_ID }}/ai/run/@cf/bytedance/stable-diffusion-xl-lightning"

          # Cloudflare now returns raw binary image data, not JSON
          curl -s --max-time 60 -X POST "$CF_URL" \
            -H "Authorization: Bearer ${{ secrets.CF_AI_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$CF_PROMPT" > cf_image.jpg

          if file cf_image.jpg | grep -q -i "image"; then
            echo "Cloudflare image generated successfully."

            REPO="$GITHUB_REPOSITORY"
            API="https://api.github.com/repos/$REPO"
            AUTH_HEADER="Authorization: Bearer $GH_TOKEN"
            ACCEPT_HEADER="Accept: application/vnd.github+json"
            VERSION_HEADER="X-GitHub-Api-Version: 2022-11-28"
            RELEASE_TAG="${IMAGE_RELEASE_TAG:-image-bucket}"

            RELEASE_RESP=$(curl -s -H "$AUTH_HEADER" -H "$ACCEPT_HEADER" -H "$VERSION_HEADER" "$API/releases/tags/$RELEASE_TAG")
            RELEASE_ID=$(echo "$RELEASE_RESP" | jq -r '.id // empty')

            if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
              echo "Creating image bucket release..."
              PAYLOAD=$(jq -n --arg tag "$RELEASE_TAG" '{tag_name:$tag,name:"Daily IT Image Bucket",draft:false,prerelease:false}')
              CREATE_RESP=$(curl -s -X POST -H "$AUTH_HEADER" -H "$ACCEPT_HEADER" -H "$VERSION_HEADER" "$API/releases" -d "$PAYLOAD")
              RELEASE_ID=$(echo "$CREATE_RESP" | jq -r '.id // empty')
              if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
                echo "Failed to create release:"
                echo "$CREATE_RESP"
              fi
            fi

            if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
              ASSET_NAME="it-cartoon-$(date +%s).jpg"
              UPLOAD_URL="https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=$ASSET_NAME"
              UPLOAD_RESP=$(curl -s -X POST -H "$AUTH_HEADER" -H "$ACCEPT_HEADER" -H "$VERSION_HEADER" -H "Content-Type: image/jpeg" --data-binary "@cf_image.jpg" "$UPLOAD_URL")
              ASSET_URL=$(echo "$UPLOAD_RESP" | jq -r '.browser_download_url // empty')
              if [ -n "$ASSET_URL" ]; then
                CURRENT_IMAGE="$ASSET_URL"
                IMAGE_SOURCE="Cloudflare AI"
                export CURRENT_IMAGE IMAGE_SOURCE
                echo "CURRENT_IMAGE=$CURRENT_IMAGE" >> $GITHUB_ENV
                echo "IMAGE_SOURCE=$IMAGE_SOURCE" >> $GITHUB_ENV
              else
                echo "Release asset upload failed:"
                echo "$UPLOAD_RESP"
              fi
            fi
          else
            echo "Cloudflare API failed to return a valid image. Output was:"
            cat cf_image.jpg || true
          fi

          # fallback if image is still missing
          if [ -z "$CURRENT_IMAGE" ]; then
            echo "Falling back to Pollinations..."
            SAFE_PROMPT=$(echo "$SAFE_SUMMARY" | head -c 80 | sed 's/[^a-zA-Z0-9 ]/ /g' | jq -sRr @uri)
            IMAGE_URL="https://image.pollinations.ai/prompt/$SAFE_PROMPT"
            echo "CURRENT_IMAGE=$IMAGE_URL" >> $GITHUB_ENV
            echo "IMAGE_SOURCE=Pollinations" >> $GITHUB_ENV
          fi

      - name: Send Approval Email via Brevo
        if: steps.vars.outputs.action != 'approve'
        env:
          BREVO_KEY: ${{ secrets.BREVO_KEY }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          APPROVER_EMAIL: ${{ secrets.APPROVER_EMAIL }}
          WORKER_URL: ${{ secrets.APPROVAL_WORKER_BASE_URL }}
          TOKEN: ${{ secrets.WORKER_SECRET_TOKEN }}
        run: |
          python3 - << 'EOF'
          import os, json, urllib.parse

          summary = os.environ.get("CURRENT_SUMMARY", "")
          hashtags = os.environ.get("HASHTAGS_TEXT", "")
          image = os.environ.get("CURRENT_IMAGE", "")
          link = os.environ.get("ARTICLE_LINK", "")
          date = os.environ.get("ARTICLE_DATE", "")
          worker_url = os.environ.get("WORKER_URL", "")
          token = os.environ.get("TOKEN", "")

          enc = lambda x: urllib.parse.quote(x)

          approve_link = f"{worker_url}?action=approve&token={token}&summary={enc(summary)}&image={enc(image)}&hashtags={enc(hashtags)}&link={enc(link)}&date={enc(date)}"
          redo_story_link = f"{worker_url}?action=redo&token={token}"
          redo_image_link = f"{worker_url}?action=redo_image&token={token}&summary={enc(summary)}&hashtags={enc(hashtags)}&link={enc(link)}&date={enc(date)}"

          html = f"""
          <h2>Daily IT News Draft</h2>
          <p><strong>Summary</strong><br>{summary}</p>
          <p><strong>Hashtags</strong><br>{hashtags}</p>
          <p><strong>Source</strong><br><a href='{link}'>{link}</a></p>
          <p><strong>Date</strong><br>{date}</p>
          <p><strong>Image</strong><br><img src='{image}' style='max-width:100%;max-height:400px;border-radius:8px'/></p>
          <div style='margin-top:20px'>
            <a href='{approve_link}' style='display:block;margin:8px 0;padding:12px 16px;background:#198754;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold;'>Approve & Post</a>
            <a href='{redo_story_link}' style='display:block;margin:8px 0;padding:12px 16px;background:#dc3545;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold;'>Redo Story</a>
            <a href='{redo_image_link}' style='display:block;margin:8px 0;padding:12px 16px;background:#fd7e14;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold;'>Redo Image</a>
          </div>
          """

          payload = {
              "sender": {"name": os.environ.get("BREVO_SENDER_NAME"), "email": os.environ.get("BREVO_SENDER_EMAIL")},
              "to": [{"email": os.environ.get("APPROVER_EMAIL")}],
              "subject": "Approval Required: Daily IT News",
              "htmlContent": html
          }

          with open("payload.json","w") as f:
              json.dump(payload,f)
          EOF

          curl -X POST "https://api.brevo.com/v3/smtp/email" \
            -H "accept: application/json" \
            -H "api-key: $BREVO_KEY" \
            -H "content-type: application/json" \
            -d @payload.json
