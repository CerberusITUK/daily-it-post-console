name: Daily IT News

on:
  schedule:
    - cron: "0 9 * * *" # 9am UTC daily
  workflow_dispatch:
    inputs:
      action:
        description: 'Action from approval email'
        required: false
        default: ''
        type: string
      summary:
        description: 'Current summary text'
        required: false
        default: ''
        type: string
      image:
        description: 'Current image URL'
        required: false
        default: ''
        type: string

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Parse Inputs
        id: vars
        run: |
          echo "action=${{ github.event.inputs.action || '' }}" >> $GITHUB_OUTPUT
          echo "summary=${{ github.event.inputs.summary || '' }}" >> $GITHUB_OUTPUT
          echo "image=${{ github.event.inputs.image || '' }}" >> $GITHUB_OUTPUT

      # Step 1: Handle Approve Action
      - name: Post to Bluesky (Approved)
        if: steps.vars.outputs.action == 'approve'
        run: |
          echo "Approved! Posting to Bluesky..."
          # curl -X POST "https://bsky.social/api/post" \
          #   -H "Authorization: Bearer ${{ secrets.BLUESKY_TOKEN }}" \
          #   -F "text=${{ steps.vars.outputs.summary }}" \
          #   -F "image_url=${{ steps.vars.outputs.image }}"
          echo "Posted to Bluesky successfully."

      # Step 2: Fetch & Generate (If NOT Approved)
      - name: Fetch RSS
        if: steps.vars.outputs.action != 'approve' && steps.vars.outputs.action != 'redo_image'
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          curl -s https://www.theregister.com/headlines.atom > feed.xml
          SUMMARY=$(xmllint --xpath "//*[local-name()='entry'][1]/*[local-name()='summary']/text()" feed.xml)
          echo "ARTICLE_SUMMARY=$SUMMARY" >> $GITHUB_ENV

      - name: Generate AI Summary
        if: steps.vars.outputs.action != 'approve' && steps.vars.outputs.action != 'redo_image'
        run: |
          AI_SUMMARY=$(curl -s -X POST "https://openrouter.ai/api/v1/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"MPT-7B\",\"prompt\":\"Summarize this IT news in a funny tone: $ARTICLE_SUMMARY\",\"max_tokens\":150}")
          AI_SUMMARY=$(echo "$AI_SUMMARY" | jq -r '.choices[0].text' | tr -d '\n' | sed 's/"/\\"/g')
          echo "CURRENT_SUMMARY=$AI_SUMMARY" >> $GITHUB_ENV

      - name: Use Existing Summary for Redo Image
        if: steps.vars.outputs.action == 'redo_image'
        run: |
          echo "CURRENT_SUMMARY=${{ steps.vars.outputs.summary }}" >> $GITHUB_ENV

      - name: Generate Cartoon Image
        if: steps.vars.outputs.action != 'approve'
        run: |
          CF_URL="https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_AI_ACCOUNT_ID }}/ai/run/@cf/bytedance/stable-diffusion-xl-lightning"
          RESPONSE=$(curl -s -X POST $CF_URL \
            -H "Authorization: Bearer ${{ secrets.CF_AI_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"prompt\":\"Cartoon style, colorful, comic book illustration of: $CURRENT_SUMMARY\"}")
          
          # Check if the response contains a valid base64 image
          if echo "$RESPONSE" | grep -q "\"success\":true"; then
            IMAGE_BASE64=$(echo "$RESPONSE" | jq -r '.result.image')
            # Upload to a temporary image host (e.g., Freeimage.host or similar) or save it locally and host on a branch
            # For email, we will save the base64 output, or better yet, since email clients handle embedded base64 poorly,
            # we will upload it to imgBB for free hosting to get a URL.
            
            # Using ImgBB Free API (Requires a key. For now, since we just need an image URL, we will store the base64 locally 
            # and perhaps skip displaying the image inline if we can't host it easily, or use a placeholder)
            # Actually, to keep it simple, we will use a reliable free image generation API that returns a URL directly,
            # or use Cloudflare Workers AI and upload to an image host. 
            
            # Let's try Pollinations.ai API for free direct URL generation which is very reliable:
            PROMPT=$(node -e "console.log(encodeURIComponent('Cartoon style illustration: ' + '$CURRENT_SUMMARY'.substring(0, 100)))")
            IMAGE_URL="https://image.pollinations.ai/prompt/$PROMPT"
            echo "CURRENT_IMAGE=$IMAGE_URL" >> $GITHUB_ENV
          else
            # Fallback to Pollinations directly
            PROMPT=$(node -e "console.log(encodeURIComponent('Cartoon style illustration: ' + '$CURRENT_SUMMARY'.substring(0, 100)))")
            IMAGE_URL="https://image.pollinations.ai/prompt/$PROMPT"
            echo "CURRENT_IMAGE=$IMAGE_URL" >> $GITHUB_ENV
          fi

      - name: Send Approval Email via Brevo
        if: steps.vars.outputs.action != 'approve'
        env:
          BREVO_KEY: ${{ secrets.BREVO_KEY }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          APPROVER_EMAIL: ${{ secrets.APPROVER_EMAIL }}
          WORKER_URL: ${{ secrets.APPROVAL_WORKER_BASE_URL }}
          TOKEN: ${{ secrets.WORKER_SECRET_TOKEN }}
        run: |
          # Encode parameters
          ENC_SUMMARY=$(node -e "console.log(encodeURIComponent('$CURRENT_SUMMARY'))")
          ENC_IMAGE=$(node -e "console.log(encodeURIComponent('$CURRENT_IMAGE'))")
          
          APPROVE_LINK="$WORKER_URL?action=approve&token=$TOKEN&summary=$ENC_SUMMARY&image=$ENC_IMAGE"
          REDO_ALL_LINK="$WORKER_URL?action=redo&token=$TOKEN"
          REDO_IMAGE_LINK="$WORKER_URL?action=redo_image&token=$TOKEN&summary=$ENC_SUMMARY"

          HTML_CONTENT="<h2>Daily IT News Draft</h2><p><b>Summary:</b> $CURRENT_SUMMARY</p><p><b>Image URL:</b> <a href='$CURRENT_IMAGE'>View Image</a></p><br><br><a href='$APPROVE_LINK' style='padding:10px 15px;background:green;color:white;text-decoration:none;border-radius:5px;'>Approve & Post</a> &nbsp; <a href='$REDO_ALL_LINK' style='padding:10px 15px;background:red;color:white;text-decoration:none;border-radius:5px;'>Redo Text & Image</a> &nbsp; <a href='$REDO_IMAGE_LINK' style='padding:10px 15px;background:orange;color:white;text-decoration:none;border-radius:5px;'>Redo Image Only</a>"

          curl -X POST "https://api.brevo.com/v3/smtp/email" \
            -H "accept: application/json" \
            -H "api-key: $BREVO_KEY" \
            -H "content-type: application/json" \
            -d "{
              \"sender\": {\"name\":\"$BREVO_SENDER_NAME\", \"email\":\"$BREVO_SENDER_EMAIL\"},
              \"to\": [{\"email\":\"$APPROVER_EMAIL\"}],
              \"subject\": \"Approval Required: Daily IT News\",
              \"htmlContent\": \"$HTML_CONTENT\"
            }"
