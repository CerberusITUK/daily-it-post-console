name: Daily IT News

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Action from approval email"
        required: false
        default: ""
        type: string
      summary:
        description: "Current summary text"
        required: false
        default: ""
        type: string
      image:
        description: "Current image URL"
        required: false
        default: ""
        type: string
      hashtags:
        description: "Current hashtags line"
        required: false
        default: ""
        type: string
      link:
        description: "Current article link"
        required: false
        default: ""
        type: string
      date:
        description: "Current article date"
        required: false
        default: ""
        type: string
      source_name:
        description: "Current article source name"
        required: false
        default: "Source"
        type: string

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Parse Inputs
        id: vars
        run: |
          echo "action=${{ github.event.inputs.action || '' }}" >> $GITHUB_OUTPUT
          cat << 'EOF' >> $GITHUB_OUTPUT
          summary=${{ github.event.inputs.summary || '' }}
          EOF
          cat << 'EOF' >> $GITHUB_OUTPUT
          image=${{ github.event.inputs.image || '' }}
          EOF
          cat << 'EOF' >> $GITHUB_OUTPUT
          hashtags=${{ github.event.inputs.hashtags || '' }}
          EOF
          cat << 'EOF' >> $GITHUB_OUTPUT
          link=${{ github.event.inputs.link || '' }}
          EOF
          cat << 'EOF' >> $GITHUB_OUTPUT
          date=${{ github.event.inputs.date || '' }}
          EOF
          cat << 'EOF' >> $GITHUB_OUTPUT
          source_name=${{ github.event.inputs.source_name || '' }}
          EOF

      - name: Install dependencies
        if: always()
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip install feedparser jq atproto

      - name: Post to Bluesky (Approved)
        if: steps.vars.outputs.action == 'approve'
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_TOKEN: ${{ secrets.BLUESKY_APP_KEY }}
          BSKY_SUMMARY: ${{ steps.vars.outputs.summary }}
          BSKY_HASHTAGS: ${{ steps.vars.outputs.hashtags }}
          BSKY_LINK: ${{ steps.vars.outputs.link }}
          BSKY_SOURCE_NAME: ${{ steps.vars.outputs.source_name }}
          BSKY_IMAGE_URL: ${{ steps.vars.outputs.image }}
        run: |
          python3 - << 'EOF'
          import os
          import urllib.request
          from atproto import Client, client_utils

          handle = os.environ.get("BLUESKY_HANDLE")
          app_password = os.environ.get("BLUESKY_TOKEN")
          
          summary = os.environ.get("BSKY_SUMMARY", "")
          hashtags = os.environ.get("BSKY_HASHTAGS", "")
          link = os.environ.get("BSKY_LINK", "")
          source_name = os.environ.get("BSKY_SOURCE_NAME", "Source")
          image_url = os.environ.get("BSKY_IMAGE_URL", "")

          if not handle or not app_password:
              print("Missing Bluesky credentials")
              exit(1)

          client = Client()
          client.login(handle, app_password)

          if link:
              # Fallback if source_name is empty or just "Source"
              if not source_name or source_name == "Source":
                  if "theregister.com" in link:
                      source_name = "The Register"
                  elif "bbc.co.uk" in link:
                      source_name = "BBC News"
                  elif "bleepingcomputer.com" in link:
                      source_name = "Bleeping Computer"
                  elif "gizmodo.com" in link:
                      source_name = "Gizmodo"

          # Fail-safe: Bluesky has a strict 300 grapheme/byte limit. 
          # We truncate the summary here if the AI ignored our prompt length constraints.
          def get_grapheme_len(text):
              return len(text.encode('utf-8'))

          overhead = 0
          if hashtags:
              overhead += get_grapheme_len(hashtags) + 2
              
          if link:
              # We will append "\n\nSource: {source_name}" at the end
              overhead += get_grapheme_len(f"Source: {source_name}") + 2

          if get_grapheme_len(summary) + overhead > 300:
              max_summary_len = 300 - overhead - 3
              encoded_summary = summary.encode('utf-8')
              truncated_bytes = encoded_summary[:max_summary_len]
              summary = truncated_bytes.decode('utf-8', 'ignore') + "..."

          text_builder = client_utils.TextBuilder()
          
          if hashtags or link:
              text_builder.text(summary + "\n\n")
          else:
              text_builder.text(summary)

          if hashtags:
              if link:
                  text_builder.text(hashtags + "\n\n")
              else:
                  text_builder.text(hashtags)

          if link and link.startswith("http"):
              text_builder.text("Source: ")
              text_builder.link(source_name, link)

          try:
              # Download image to memory
              req = urllib.request.Request(image_url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req) as response:
                  img_data = response.read()
              
              client.send_image(
                  text=text_builder,
                  image=img_data,
                  image_alt="Daily IT News cartoon"
              )
              print("Successfully posted to Bluesky with image!")
          except Exception as e:
              print(f"Failed to post image: {e}")
              print("Falling back to text-only post")
              client.send_post(text_builder)

          EOF

      - name: Fetch RSS
        if: steps.vars.outputs.action != 'approve' && steps.vars.outputs.action != 'redo_image'
        run: |
          python3 - << 'EOF'
          import os, random, re
          from datetime import datetime, timezone, timedelta
          from zoneinfo import ZoneInfo
          import feedparser

          FEEDS = [
              'https://www.theregister.com/headlines.atom',
              'https://www.bbc.co.uk/news/technology/rss.xml',
              'https://www.bleepingcomputer.com/feed/',
              'https://gizmodo.com/tech/feed',
          ]

          COMMON_MAN_KEYWORDS = [
              'outage', 'breach', 'down', 'fail', 'bug', 'hack', 'steal', 'stolen', 'error', 'scam', 'fraud', 'leak', 'crash', 'ransomware', 'bank', 'glitch'
          ]

          now_utc = datetime.now(timezone.utc)
          window = now_utc - timedelta(hours=24)
          
          all_recent = []
          high_priority = []
          fallback_entries = []

          def entry_dt(entry):
              if getattr(entry, 'published_parsed', None):
                  return datetime(*entry.published_parsed[:6], tzinfo=timezone.utc)
              if getattr(entry, 'updated_parsed', None):
                  return datetime(*entry.updated_parsed[:6], tzinfo=timezone.utc)
              return None

          def calculate_score(entry):
              title = entry.get('title', '').lower()
              summary = entry.get('summary', getattr(entry, 'description', '')).lower()
              text = title + " " + summary
              score = 0
              for kw in COMMON_MAN_KEYWORDS:
                  if re.search(rf'\b{kw}\b', text):
                      score += 1
              return score

          for url in FEEDS:
              feed = feedparser.parse(url)
              if feed.entries:
                  # Save newest entry from this feed as a fallback
                  sorted_entries = sorted([e for e in feed.entries if entry_dt(e)], key=lambda x: entry_dt(x), reverse=True)
                  if sorted_entries:
                      fallback_entries.append((entry_dt(sorted_entries[0]), sorted_entries[0]))

              for entry in feed.entries:
                  dt = entry_dt(entry)
                  if not dt:
                      continue
                  if dt >= window:
                      score = calculate_score(entry)
                      item = (score, dt, entry)
                      all_recent.append(item)
                      if score > 0:
                          high_priority.append(item)

          if not all_recent and not fallback_entries:
              raise SystemExit('No RSS entries available')

          if high_priority:
              # Sort by score descending
              high_priority.sort(key=lambda x: x[0], reverse=True)
              top_score = high_priority[0][0]
              # Pick randomly from the items that share the top score
              best_candidates = [x for x in high_priority if x[0] == top_score]
              chosen_dt, chosen_entry = random.choice(best_candidates)[1:]
          elif all_recent:
              chosen_dt, chosen_entry = random.choice(all_recent)[1:]
          else:
              chosen_dt, chosen_entry = random.choice(fallback_entries)

          link = getattr(chosen_entry, 'link', 'https://www.theregister.com/')
          
          # Try to get as much text as possible for the AI
          summary_text = getattr(chosen_entry, 'summary', getattr(chosen_entry, 'description', '')) or ''
          if hasattr(chosen_entry, 'content'):
              summary_text = chosen_entry.content[0].value
              
          # If the RSS text is short, try to scrape the page
          if len(summary_text) < 500:
              import urllib.request
              try:
                  req = urllib.request.Request(link, headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'})
                  html = urllib.request.urlopen(req, timeout=5).read().decode('utf-8', errors='ignore')
                  paragraphs = re.findall(r'<p[^>]*>(.*?)</p>', html, re.IGNORECASE | re.DOTALL)
                  clean_text = []
                  for p in paragraphs:
                      p = re.sub(r'<[^>]+>', '', p)
                      p = p.replace('&quot;', '"').replace('&apos;', "'").replace('&#39;', "'").replace('&amp;', '&').replace('&lt;', '<').replace('&gt;', '>')
                      p = ' '.join(p.split())
                      if len(p) > 50 and '.' in p:
                          clean_text.append(p)
                  scraped_text = ' '.join(clean_text)
                  if len(scraped_text) > len(summary_text):
                      summary_text = scraped_text
              except Exception:
                  pass
                  
          summary_text = ' '.join(summary_text.split())
          # Limit to 3000 chars to avoid breaking bash/API limits
          summary = summary_text[:3000]

          dt_local = chosen_dt.astimezone(ZoneInfo('Europe/London')) if chosen_dt else datetime.now(ZoneInfo('Europe/London'))
          formatted_date = dt_local.strftime('%d/%m/%Y')

          with open(os.environ['GITHUB_ENV'], 'a') as env:
              env.write(f'ARTICLE_SUMMARY={summary}\n')
              env.write(f'ARTICLE_LINK={link}\n')
              env.write(f'ARTICLE_DATE={formatted_date}\n')
          EOF

      - name: Generate AI Summary
        if: steps.vars.outputs.action != 'approve' && steps.vars.outputs.action != 'redo_image'
        run: |
          #!/bin/bash
          # Use simple assignment to avoid Bash-only printf issues
          PROMPT_TEXT="You are a deeply cynical, highly sarcastic IT engineer. Read this news: $ARTICLE_SUMMARY. STRICT FORMAT REQUIREMENT: Your summary must be exactly 3 sentences long. Sentences 1 and 2 must sarcastically describe the core news in plain English that a non-technical person understands (e.g. 'the internet broke because someone tripped over a wire' instead of 'BGP routes dropped'). Sentence 3 must be a standalone, biting, hilarious punchline about the situation. Also provide a witty title and sarcastic hashtags. CRITICAL: The total combined length of the title and summary MUST be under 200 characters to leave room for the link. Make it punchy. Output ONLY valid JSON in this exact format: {\"title\": \"<text>\", \"summary\": \"<text>\", \"hashtags\": [\"#tag1\",\"#tag2\"]}."

          PAYLOAD=$(jq -n --arg msg "$PROMPT_TEXT" '{model: "nousresearch/hermes-3-llama-3.1-405b", messages: [{role: "user", content: $msg}], max_tokens:250}')

          AI_RESPONSE=$(curl -s --max-time 60 -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          export AI_RESPONSE

          python3 - << 'EOF'
          import os, json, re, urllib.request, urllib.parse

          resp = os.environ.get("AI_RESPONSE", "")
          article_link = os.environ.get("ARTICLE_LINK", "https://www.theregister.com/")
          article_date = os.environ.get("ARTICLE_DATE", "")
          
          # Shorten URL
          try:
              api_url = "https://tinyurl.com/api-create.php?url=" + urllib.parse.quote(article_link)
              req = urllib.request.urlopen(api_url)
              short_link = req.read().decode('utf-8')
          except Exception:
              short_link = article_link

          # Determine Source Name
          source_name = "Source"
          if "theregister.com" in article_link:
              source_name = "The Register"
          elif "bbc.co.uk" in article_link:
              source_name = "BBC News"
          elif "bleepingcomputer.com" in article_link:
              source_name = "Bleeping Computer"
          elif "gizmodo.com" in article_link:
              source_name = "Gizmodo"

          try:
              content = json.loads(resp)["choices"][0]["message"]["content"]
              match = re.search(r'\{.*\}', content, re.DOTALL)
              if match:
                  data = json.loads(match.group(0))
                  title = data.get("title", "").strip()
                  summary = data.get("summary", "").strip()
                  hashtags = " ".join(data.get("hashtags", []))
                  
                  if title and summary:
                      final_summary = f"{title}. {summary}"
                  elif title:
                      final_summary = title
                  else:
                      final_summary = summary
                      
                  # Clean newlines
                  final_summary = " ".join(final_summary.split())
                  hashtags = " ".join(hashtags.split())
              else:
                  # Fallback if AI didn't return valid JSON structure at all
                  final_summary = " ".join(content.split())
                  hashtags = "#IT #News"
          except Exception as e:
              final_summary = "Failed to parse AI summary."
              hashtags = "#IT #News"

          with open(os.environ['GITHUB_ENV'], 'a') as env:
              env.write(f"SUMMARY_TEXT={final_summary}\n")
              env.write(f"CURRENT_SUMMARY={final_summary}\n")
              env.write(f"HASHTAGS_TEXT={hashtags}\n")
              env.write(f"SOURCE_NAME={source_name}\n")
              env.write(f"SOURCE_LINE=Source: {source_name}\n")
              env.write(f"ARTICLE_LINK={short_link}\n")
              env.write(f"DATE_LINE=Date: {article_date}\n")
          EOF

      - name: Use Existing Summary for Redo Image
        if: steps.vars.outputs.action == 'redo_image'
        run: |
          echo "CURRENT_SUMMARY=${{ steps.vars.outputs.summary }}" >> $GITHUB_ENV
          echo "HASHTAGS_TEXT=${{ steps.vars.outputs.hashtags }}" >> $GITHUB_ENV
          echo "ARTICLE_LINK=${{ steps.vars.outputs.link }}" >> $GITHUB_ENV
          echo "ARTICLE_DATE=${{ steps.vars.outputs.date }}" >> $GITHUB_ENV
          echo "SOURCE_NAME=${{ steps.vars.outputs.source_name }}" >> $GITHUB_ENV
          if [ -n "${{ steps.vars.outputs.image }}" ]; then
            echo "CURRENT_IMAGE=${{ steps.vars.outputs.image }}" >> $GITHUB_ENV
          fi

      - name: Generate Cartoon Image
        if: steps.vars.outputs.action != 'approve'
        env:
          IMAGE_REPO_PAT: ${{ secrets.IMAGE_REPO_PAT }}
          IMAGE_REPO: CerberusITUK/daily-post-images
          IMAGE_BRANCH: main
        run: |
          #!/bin/bash
          SAFE_SUMMARY=$(echo "$CURRENT_SUMMARY" | tr '\n' ' ' | sed 's/["'"'"']//g')
          
          # Use Kie.ai nano-banana-2
          KIE_API_KEY="${{ secrets.KAI_IMAGE_API_KEY }}"
          CREATE_PAYLOAD=$(jq -n --arg msg "A funny full-colour single-panel British comic cartoon of IT fail: $SAFE_SUMMARY. Keep words and text minimal; only include text if it adds comedic value. Any text in the image must make sense in English and be correctly spelled. Must be in vivid color." '{model: "nano-banana-2", input: {prompt: $msg}}')
          
          CREATE_RESP=$(curl -s -X POST "https://api.kie.ai/api/v1/jobs/createTask" \
            -H "Authorization: Bearer $KIE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$CREATE_PAYLOAD")
            
          TASK_ID=$(echo "$CREATE_RESP" | jq -r '.data.taskId // empty')
          
          if [ -n "$TASK_ID" ]; then
            echo "Nano Banana 2 task created: $TASK_ID"
            
            # Poll for completion
            MAX_RETRIES=60
            RETRY_COUNT=0
            IMG_URL=""
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              sleep 5
              STAT_RESP=$(curl -s "https://api.kie.ai/api/v1/jobs/recordInfo?taskId=$TASK_ID" -H "Authorization: Bearer $KIE_API_KEY")
              STATE=$(echo "$STAT_RESP" | jq -r '.data.state // empty')
              
              if [ "$STATE" = "success" ]; then
                # resultJson is a stringified JSON containing resultUrls
                RESULT_STR=$(echo "$STAT_RESP" | jq -r '.data.resultJson // empty')
                IMG_URL=$(echo "$RESULT_STR" | jq -r '.resultUrls[0] // empty')
                break
              elif [ "$STATE" = "failed" ] || [ "$STATE" = "error" ]; then
                echo "Image generation failed: $STAT_RESP"
                break
              fi
              
              RETRY_COUNT=$((RETRY_COUNT+1))
              echo "Polling... ($RETRY_COUNT/$MAX_RETRIES) State: $STATE"
            done
            
            if [ -n "$IMG_URL" ]; then
              echo "Downloading image from: $IMG_URL"
              curl -s "$IMG_URL" > cf_image.jpg
            else
              echo "Failed to get image URL after polling."
            fi
          else
            echo "Failed to create task: $CREATE_RESP"
          fi

          if [ -f cf_image.jpg ] && file cf_image.jpg | grep -q -i "image"; then
            echo "Image downloaded successfully."
            
            # Compress image to ensure it is under Bluesky's 976KB limit
            # GitHub Ubuntu runners have ImageMagick pre-installed
            echo "Compressing image..."
            mogrify -quality 80 cf_image.jpg
            echo "Compressed image size: $(ls -lh cf_image.jpg | awk '{print $5}')"

            if [ -z "$IMAGE_REPO_PAT" ]; then
              echo "IMAGE_REPO_PAT secret is missing."
              exit 1
            fi

            ASSET_NAME="it-cartoon-$(date +%s).jpg"
            DATE_PATH=$(date +%Y/%m/%d)
            REMOTE_PATH="images/$DATE_PATH/$ASSET_NAME"
            IMAGE_REPO="${IMAGE_REPO:-CerberusITUK/daily-post-images}"
            IMAGE_BRANCH="${IMAGE_BRANCH:-main}"
            API_URL="https://api.github.com/repos/$IMAGE_REPO/contents/$REMOTE_PATH"

            echo "Uploading $ASSET_NAME to $IMAGE_REPO at $REMOTE_PATH"
            B64_CONTENT=$(base64 -w 0 cf_image.jpg || base64 cf_image.jpg | tr -d '\n')
            echo -n "$B64_CONTENT" > b64_content.txt
            jq -n --arg message "Add $ASSET_NAME" --arg branch "$IMAGE_BRANCH" --rawfile content b64_content.txt '{message:$message,content:$content,branch:$branch}' > payload.json

            UPLOAD_RESP=$(curl -sS -X PUT "$API_URL" \
              -H "Authorization: Bearer $IMAGE_REPO_PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d @payload.json || true)

            echo "Upload response: $UPLOAD_RESP"
            ASSET_URL=$(echo "$UPLOAD_RESP" | jq -r '.content.download_url // empty')
            if [ -n "$ASSET_URL" ]; then
              CURRENT_IMAGE="$ASSET_URL"
              IMAGE_SOURCE="Cloudflare AI"
              export CURRENT_IMAGE IMAGE_SOURCE
              echo "CURRENT_IMAGE=$CURRENT_IMAGE" >> $GITHUB_ENV
              echo "IMAGE_SOURCE=$IMAGE_SOURCE" >> $GITHUB_ENV
            else
              echo "Failed to upload image to public repo"
            fi
          else
            echo "Cloudflare API failed to return a valid image. Output was:"
            cat cf_image.jpg || true
          fi

          if [ -z "$CURRENT_IMAGE" ]; then
            echo "ERROR: Image upload failed, aborting run."
            exit 1
          fi

      - name: Send Approval Email via Brevo
        if: steps.vars.outputs.action != 'approve'
        env:
          BREVO_KEY: ${{ secrets.BREVO_KEY }}
          BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          APPROVER_EMAIL: ${{ secrets.APPROVER_EMAIL }}
          WORKER_URL: ${{ secrets.APPROVAL_WORKER_BASE_URL }}
          SIGNING_SECRET: ${{ secrets.WORKER_SIGNING_SECRET }}
        run: |
          python3 - << 'EOF'
          import os, json, urllib.parse, hmac, hashlib, time
          
          summary = os.environ.get("CURRENT_SUMMARY", "")
          hashtags = os.environ.get("HASHTAGS_TEXT", "")
          image = os.environ.get("CURRENT_IMAGE", "")
          link = os.environ.get("ARTICLE_LINK", "")
          date = os.environ.get("ARTICLE_DATE", "")
          source_name = os.environ.get("SOURCE_NAME", "Source")
          worker_url = os.environ.get("WORKER_URL", "")
          signing_secret = os.environ.get("SIGNING_SECRET", "")

          if not worker_url or not signing_secret:
              raise SystemExit("Missing worker URL or signing secret")

          enc = lambda x: urllib.parse.quote(x)

          def build_signed_link(action, summary_value="", image_value="", hashtags_value="", link_value="", date_value="", source_name_value="Source"):
              expires = str(int(time.time()) + 3600)
              payload = "\n".join([
                  action,
                  summary_value,
                  image_value,
                  hashtags_value,
                  link_value,
                  date_value,
                  source_name_value,
                  expires,
              ])
              signature = hmac.new(signing_secret.encode("utf-8"), payload.encode("utf-8"), hashlib.sha256).hexdigest()
              return (
                  f"{worker_url}?action={enc(action)}"
                  f"&summary={enc(summary_value)}"
                  f"&image={enc(image_value)}"
                  f"&hashtags={enc(hashtags_value)}"
                  f"&link={enc(link_value)}"
                  f"&date={enc(date_value)}"
                  f"&source_name={enc(source_name_value)}"
                  f"&expires={enc(expires)}"
                  f"&sig={enc(signature)}"
              )
          
          approve_link = build_signed_link("approve", summary, image, hashtags, link, date, source_name)
          redo_story_link = build_signed_link("redo")
          redo_image_link = build_signed_link("redo_image", summary, "", hashtags, link, date, source_name)

          html = f"""
          <h2>Daily IT News Draft</h2>
          <p><strong>Summary</strong><br>{summary}</p>
          <p><strong>Hashtags</strong><br>{hashtags}</p>
          <p><strong>Source</strong><br><a href='{link}'>{source_name}</a></p>
          <p><strong>Date</strong><br>{date}</p>
          <p><strong>Image</strong><br><img src='{image}' style='max-width:100%;max-height:400px;border-radius:8px'/></p>
          <div style='margin-top:20px'>
            <a href='{approve_link}' style='display:block;margin:8px 0;padding:12px 16px;background:#198754;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold;'>Approve & Post</a>
            <a href='{redo_story_link}' style='display:block;margin:8px 0;padding:12px 16px;background:#dc3545;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold;'>Redo Story</a>
            <a href='{redo_image_link}' style='display:block;margin:8px 0;padding:12px 16px;background:#fd7e14;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold;'>Redo Image</a>
          </div>
          """

          payload = {
              "sender": {"name": os.environ.get("BREVO_SENDER_NAME"), "email": os.environ.get("BREVO_SENDER_EMAIL")},
              "to": [{"email": os.environ.get("APPROVER_EMAIL")}],
              "subject": "Approval Required: Daily IT News",
              "htmlContent": html
          }

          with open("payload.json","w") as f:
              json.dump(payload,f)
          EOF

          curl -X POST "https://api.brevo.com/v3/smtp/email" \
            -H "accept: application/json" \
            -H "api-key: $BREVO_KEY" \
            -H "content-type: application/json" \
            -d @payload.json
